<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightAI — Conversational BI Dashboard</title>
    <meta name="description" content="Generate interactive business intelligence dashboards using natural language. Powered by AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=6.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#00D2FF"/></linearGradient></defs>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                    <h1>InsightAI</h1>
                </div>
            </div>

            <div class="sidebar-actions">
                <button id="newChatBtn" class="btn-action" title="New conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Chat
                </button>
                <button id="vaultBtn" class="btn-action" title="View Saved Charts">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Graph Vault
                </button>
                <label id="uploadBtn" class="btn-action btn-upload" title="Upload your own CSV">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload CSV
                    <input type="file" id="csvUpload" accept=".csv" hidden>
                </label>
            </div>

            <div class="sidebar-info">
                <div class="dataset-badge" id="datasetBadge">
                    <span class="dot"></span>
                    Consumer Behavior Dataset
                </div>
                <p class="hint">Ask anything about your data in plain English.</p>
            </div>

            <div class="sidebar-suggestions">
                <p class="suggestions-title">Try asking:</p>
                <button class="suggestion" data-query="Show me the average monthly income by gender">Average income by gender</button>
                <button class="suggestion" data-query="Compare online spend vs store spend across city tiers">Online vs store spend by city</button>
                <button class="suggestion" data-query="What is the distribution of shopping preferences and how does tech savvy score relate to online orders?">Shopping preferences & tech impact</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Messages + Dashboard Area -->
            <div class="chat-dashboard-area" id="chatArea">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#welcomeGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <defs><linearGradient id="welcomeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7b61ff"/><stop offset="100%" stop-color="#00e5ff"/></linearGradient></defs>
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                    </div>
                    <h2>What would you like to explore?</h2>
                    <p>Type a question in plain English and I'll generate an interactive dashboard for you.</p>
                </div>
            </div>

            <!-- Vault Area -->
            <div class="vault-area" id="vaultArea" style="display: none;">
                <div class="vault-header">
                    <div class="vault-title">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <h2>Your Saved Vault</h2>
                    </div>
                    <div class="vault-search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="vaultSearch" placeholder="Search saved charts...">
                    </div>
                </div>
                <div class="vault-grid" id="vaultGrid"></div>
            </div>

            <!-- Input Bar -->
            <div class="input-bar" id="inputBar">
                <div class="input-wrapper">
                    <textarea id="queryInput" placeholder="Ask a question about your data..." rows="1"></textarea>
                    <button id="sendBtn" title="Send query">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
            </div>
        </main>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
